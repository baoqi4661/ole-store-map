    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {overflow: hidden;}
        
        /* 顶部筛选栏样式 */
        .brand-filter-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            z-index: 999;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        /* 按钮样式 */
        .brand-filter-bar button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .btn-all {background: #1890ff; color: white;}
        .btn-all:hover {background: #096dd9;}
        .btn-brand {background: #f0f2f5; color: #333;}
        .btn-brand:hover {background: #e6f7ff; color: #1890ff;}
        .btn-brand.active {background: #1890ff; color: white;}
        
        /* 中间门店数提示层 */
        .center-count-tooltip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(24, 144, 255, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 36px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 2000;
            animation: fadeInOut 3s ease forwards;
            pointer-events: none; /* 不影响地图操作 */
        }
        
        /* 淡入淡出动画：1秒淡入，1秒保持，1秒淡出 */
        @keyframes fadeInOut {
            0% {opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
            20% {opacity: 1; transform: translate(-50%, -50%) scale(1.1);}
            50% {opacity: 1; transform: translate(-50%, -50%) scale(1);}
            100% {opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
        }
        
        /* 数据加载按钮样式 */
        .load-data-btn {
            position: absolute;
            top: 70px;
            left: 20px;
            z-index: 999;
            padding: 8px 16px;
            background: #52c41a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .load-data-btn:hover {background: #389e0d;}
        
        /* 地图容器样式 */
        #map-container {width: 100vw; height: 100vh; margin-top: 60px;}
        
        /* 隐藏滚动条 */
        .brand-filter-bar::-webkit-scrollbar {display: none;}
        .brand-filter-bar {scrollbar-width: none; -ms-overflow-style: none;}
        #fileInput {display: none;}
    </style>

        // 初始化地图
        function initMap() {
            map = new AMap.Map('map-container', {
                zoom: 5,
                center: [116.397428, 39.90923],
                resizeEnable: true,
                mapStyle: 'amap://styles/normal'
            });
            map.addControl(new AMap.Scale());
            map.addControl(new AMap.Zoom());
        }

        // 显示中间门店数提示的通用函数
        function showCenterCountTooltip(text) {
            // 先移除已存在的提示框
            document.querySelectorAll('.center-count-tooltip').forEach(tool => tool.remove());
            
            // 创建提示框元素
            const tooltip = document.createElement('div');
            tooltip.className = 'center-count-tooltip';
            tooltip.innerText = text;
            
            // 添加到页面
            document.body.appendChild(tooltip);
            
            // 3秒后自动移除（和动画时长一致）
            setTimeout(() => {
                tooltip.remove();
            }, 3000);
        }

       // 直接加载内置数据
      function loadStoreData() {
             try {
                  storeData = embeddedData; // 直接使用我们之前粘贴好的内置数据
                  initStoreMarkers();
                  alert(`✅ 数据加载成功！共读取到 ${storeData.length} 条记录`);
            } catch (error) {
                  alert(`❌ 数据加载失败：${error.message}`);
            }
       }

        // 初始化门店标记
        function initStoreMarkers() {
            allMarkers = [];
            storeData.forEach(store => {
                if (!store.lng || !store.lat || isNaN(store.lng) || isNaN(store.lat)) return;
                
                const oleIcon = new AMap.Icon({
                    size: new AMap.Size(40, 40),
                    image: BRAND_ICON_MAP["OLE"],
                    imageSize: new AMap.Size(40, 40)
                });

                const marker = new AMap.Marker({
                    position: [parseFloat(store.lng), parseFloat(store.lat)],
                    title: store.storeName,
                    icon: oleIcon,
                    zIndex: 10
                });

                // hover仅显示门店名称
                marker.on('mouseover', function() {
                    this.openInfoWindow(new AMap.InfoWindow({
                        content: `<div style="padding: 8px 12px; font-size: 14px;">${store.storeName}</div>`,
                        offset: new AMap.Pixel(0, -45)
                    }));
                });
                marker.on('mouseout', function() {
                    this.closeInfoWindow();
                });

                allMarkers.push(marker);
            });
            // 添加标记到地图
            allMarkers.forEach(marker => marker.setMap(map));
        }

        // 显示全部门店（仅修正全部门店数统计逻辑）
        function showAllStores() {
                 // 新增：如果数据为空，强制加载
               if (storeData.length === 0) {
                    loadStoreData();
               }

            const uniqueStoreNames = [...new Set(storeData.map(store => store.storeName))];

            showCenterCountTooltip(`全部门店：${realStoreCount}`);

                marker.show();

        // 按品牌筛选（保持原有正确逻辑，不修改）
        function filterByBrand(targetBrand) {
            if (storeData.length === 0) {
                loadStoreData();
    }
            if (allMarkers.length === 0) {
                alert('请先加载门店数据！');
                return;
            }
            resetButtonStyle();
            
            // 找到当前点击的品牌按钮
            document.querySelectorAll('.btn-brand').forEach(btn => {
                if (btn.innerText === targetBrand) {
                    btn.classList.add('active');
                }
            });

            // 创建品牌图标
            const brandIcon = new AMap.Icon({
                size: new AMap.Size(40, 40),
                image: BRAND_ICON_MAP[targetBrand],
                imageSize: new AMap.Size(40, 40)
            });

            // 统计匹配的品牌门店数（保持原有正确逻辑）
            let matchCount = 0;
            allMarkers.forEach((marker, index) => {

                if (store.brand && store.brand.includes(targetBrand)) {
                    matchCount++;

                } else {

                }
            });
            
            // 显示品牌门店数
            showCenterCountTooltip(`${targetBrand}：${matchCount} 家`);
            
            if (matchCount === 0) {
                alert(`未找到包含 "${targetBrand}" 的门店，请检查Excel数据！`);
            }
        }

        // 重置按钮样式
        function resetButtonStyle() {
            document.querySelectorAll('.brand-filter-bar button').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        // 页面加载初始化
        window.onload = function() {

(function(){
    // 1. 从链接获取供应商参数：只处理 ZS / SW，ZY 用无参数链接
    const urlParams = new URLSearchParams(window.location.search);
    const supplier = urlParams.get('supplier');

    // 没有参数 → 显示全部（ZY/你自己用），直接退出
    if (!supplier || supplier === 'ZY') return;

    // 2. 硬编码：ZS/SW 对应的品牌（你替换成实际品牌名即可）
    const supplierBrands = {
        ZS: ["长工酱油", "池莉三轮", "玛瑙托", "七尾", "山本三轮"], // ← 替换成ZS负责的品牌
        SW: ["伊之助", "东亚", "丸胜高田", "鸭川"]                // ← 替换成SW负责的品牌
    };

    // 3. 延迟执行，确保按钮加载完成
    setTimeout(() => {
        // 获取所有品牌按钮
        const btns = document.querySelectorAll('.brand-filter-bar button');
        
        // 只保留当前供应商的品牌按钮
        const allowBrands = supplierBrands[supplier] || [];
        btns.forEach(btn => {
            const btnBrand = btn.textContent.trim();
            
            // 全部门店按钮永远显示
            if (btnBrand.includes('全部门店')) {
                btn.style.display = '';
                return;
            }

            // 只显示允许的品牌，其他隐藏
            btn.style.display = allowBrands.includes(btnBrand) ? '' : 'none';
        });
    }, 1000);
})();
// ========== 权限控制结束 ========== 
       // ========== 门店搜索+定位功能 ==========
(function(){
  // 1. 获取DOM元素
  const searchInput = document.getElementById('storeSearchInput');
  const searchBtn = document.getElementById('searchBtn');
  const clearBtn = document.getElementById('clearSearchBtn');
  
  // 2. 供应商权限过滤（复用之前的品牌列表）
  const supplierBrands = {
    ZS: ["长工酱油", "池莉三轮", "玛瑙托", "七尾", "山本三轮"],
    SW: ["伊之助", "东亚", "丸胜高田", "鸭川"]
  };
  const urlParams = new URLSearchParams(window.location.search);
  const supplier = urlParams.get('supplier');
  const allowBrands = supplier ? (supplierBrands[supplier] || []) : [];

  // 3. 搜索核心函数
  function searchStores(keyword) {
    if (!keyword.trim()) {
      alert('请输入搜索关键词（如：金融街）');
      return;
    }

    // 门店数据变量名：storeData
    let matchedStores = [];
    if (window.storeData && window.storeData.length > 0) {
      matchedStores = window.storeData.filter(store => {
        // 搜索门店名/品牌名
        const matchKeyword = store['门店名称'].includes(keyword) || store['品牌名称'].includes(keyword);
        // 按供应商权限过滤
        if (supplier && supplier !== 'ZY') {
          return matchKeyword && allowBrands.includes(store['品牌名称']);
        }
        return matchKeyword;
      });
    } else {
      alert('未加载门店数据，请先导入Excel！');
      return;
    }

    if (matchedStores.length === 0) {
      alert(`未找到含“${keyword}”的门店！`);
      return;
    }

    // 4. 地图居中+缩放（高德地图）
    const map = window.map; // 这里先假设你的地图实例变量名是 map
    if (!map) {
      alert('未找到地图实例，请检查地图变量名！');
      return;
    }

    // 计算中心点
    const lngs = matchedStores.map(s => s.经度);
    const lats = matchedStores.map(s => s.纬度);
    const centerLng = (Math.max(...lngs) + Math.min(...lngs)) / 2;
    const centerLat = (Math.max(...lats) + Math.min(...lats)) / 2;

    // 地图居中并放大
    map.setZoom(16);
    map.setCenter([centerLng, centerLat]);

    // 5. 绘制环形品牌标签
    drawCircleBrands(matchedStores, centerLng, centerLat);
  }

  // 6. 环形品牌标签绘制函数
  function drawCircleBrands(stores, centerLng, centerLat) {
    // 先清除之前的标签
    document.querySelectorAll('.circle-brand-label').forEach(el => el.remove());

    // 提取去重的品牌名
    const brands = [...new Set(stores.map(s => s['品牌名称']))];
    const radius = 0.0005; // 环形半径（经纬度单位）
    const angleStep = (2 * Math.PI) / brands.length;

    brands.forEach((brand, index) => {
      // 计算每个品牌的经纬度位置
      const angle = index * angleStep;
      const lng = centerLng + radius * Math.cos(angle);
      const lat = centerLat + radius * Math.sin(angle);

      // 创建品牌标签（高德地图）
      const label = new AMap.Text({
        text: brand,
        position: [lng, lat],
        offset: new AMap.Pixel(-20, -10),
        className: 'circle-brand-label',
        style: {
          background: 'rgba(66, 185, 131, 0.8)',
          color: 'white',
          padding: '4px 8px',
          borderRadius: '4px',
          fontSize: '12px',
          border: 'none'
        }
      });

      // 鼠标悬浮显示门店信息
      label.on('mouseover', () => {
        const brandStores = stores.filter(s => s['品牌名称'] === brand);
        const info = brandStores.map(s => `${s['品牌名称']}-${s['门店名称']}`).join('<br>');
        label.setStyle({ background: 'rgba(64, 158, 255, 0.9)' });
        const infoWindow = new AMap.InfoWindow({ content: info });
        infoWindow.open(map, [lng, lat]);
      });

      label.on('mouseout', () => {
        label.setStyle({ background: 'rgba(66, 185, 131, 0.8)' });
        map.clearInfoWindow();
      });

      label.addTo(map);
    });

    // 居中门店图标高亮
    const centerMarker = new AMap.Marker({
      position: [centerLng, centerLat],
      icon: new AMap.Icon({
        size: new AMap.Size(30, 30),
        image: 'https://webapi.amap.com/theme/v1.3/markers/mark_red.png',
        imageSize: new AMap.Size(30, 30)
      }),
      zIndex: 100
    });
    centerMarker.addTo(map);
  }

  // 7. 绑定按钮事件
  searchBtn.addEventListener('click', () => searchStores(searchInput.value));
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    document.querySelectorAll('.circle-brand-label').forEach(el => el.remove());
    if (window.map) {
      window.map.clearInfoWindow();
      window.map.setZoom(12);
    }
  });

  // 回车搜索
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchStores(searchInput.value);
  });
})();
// ========== 搜索功能结束 ==========
    </script>
